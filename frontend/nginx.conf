server {
    listen 80;
    server_name localhost;

    # 需求文档上传、大 Body 接口（默认 1m 过小会导致异常）
    client_max_body_size 50m;

    # 强制全站 UTF-8，解决中文乱码
    charset utf-8;
    charset_types text/html text/css application/javascript application/json text/plain;

    # Swagger：mgmt 挂在 /docs；浏览器统一用 /api/docs，由 Nginx 重写路径
    location ^~ /api/docs {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/docs(.*)$ /docs$1 break;
        proxy_pass http://mgmt_api_final:3000;
    }

    # Swagger UI 可能请求 /api/docs-json（相对当前页解析）
    location = /api/docs-json {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://mgmt_api_final:3000/docs-json;
    }
    location = /api/docs-yaml {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://mgmt_api_final:3000/docs-yaml;
    }
    # 若脚本使用站点根路径 /docs-json
    location = /docs-json {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://mgmt_api_final:3000/docs-json;
    }
    location = /docs-yaml {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://mgmt_api_final:3000/docs-yaml;
    }

    # 与 Docker Compose 中网关同源访问：浏览器只请求当前站点，由 Nginx 转发到管理 API / 执行引擎
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://mgmt_api_final:3000/;
    }

    location /engine/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_pass http://exec_engine_final:8000/;
    }

    # /data-builder/* 保留给直连 exec-engine 的接口与 L3 回退链路；L3 默认主链路走 /api/* 到 mgmt-api
    location /data-builder/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_pass http://exec_engine_final:8000/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        # 确保 HTML 文件带 UTF-8 charset 响应头
        add_header Content-Type "text/html; charset=utf-8";
    }

    # JS / CSS 资源明确声明 UTF-8
    location ~* \.(js|css)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Type-Options "nosniff";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
