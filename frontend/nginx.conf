server {
    listen 80;
    server_name localhost;

    # 强制全站 UTF-8，解决中文乱码
    charset utf-8;
    charset_types text/html text/css application/javascript application/json text/plain;

    # 与 Docker Compose 中网关同源访问：浏览器只请求当前站点，由 Nginx 转发到管理 API / 执行引擎
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://mgmt_api_final:3000/;
    }

    location /engine/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://exec_engine_final:8000/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        # 确保 HTML 文件带 UTF-8 charset 响应头
        add_header Content-Type "text/html; charset=utf-8";
    }

    # JS / CSS 资源明确声明 UTF-8
    location ~* \.(js|css)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Type-Options "nosniff";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
