# Nginx 反代示例：hahaliu.cn
# 用法：把本文件复制到服务器（如 /etc/nginx/sites-available/hahaliu.cn），
# 修改 ssl 证书路径后，ln -s 到 sites-enabled 并 nginx -t && systemctl reload nginx
#
# 前置条件：
# 1. DNS：hahaliu.cn（及可选 www）A 记录指向本机公网 IP
# 2. 本机已 docker compose up，且 3010 / 3011 / 8010 仅监听 127.0.0.1（推荐）或防火墙仅本机访问
# 3. 云证书：下载 Nginx 格式 PEM（证书链 + 私钥），填到下面两行路径

# HTTP 跳转 HTTPS（统一到主域名 hahaliu.cn；证书需含该域名，若只用 www 请改 server_name 与 return）
server {
    listen 80;
    listen [::]:80;
    server_name hahaliu.cn www.hahaliu.cn;
    return 301 https://hahaliu.cn$request_uri;
}

# 若希望 www 也统一到主域名，可保留上面 return；若需 www 可访问，把 server_name 与证书 SAN 对齐

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hahaliu.cn www.hahaliu.cn;

    # —— 云证书路径（按云厂商下载的 Nginx 证书改）——
    ssl_certificate     /etc/nginx/ssl/hahaliu.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/hahaliu.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50m;

    # 前端（Docker 映射 3010）
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 管理 API：对外 /api → 后端根路径（Nest 无全局 /api 前缀）
    location /api/ {
        proxy_pass http://127.0.0.1:3011/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 执行引擎：对外 /engine/ → 后端根路径
    location /engine/ {
        proxy_pass http://127.0.0.1:8010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 无尾部斜杠时补全（可选）
    location = /engine {
        return 302 /engine/;
    }
}
